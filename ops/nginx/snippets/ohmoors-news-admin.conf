# Protected reverse proxy for the internal news admin service.
# Create the htpasswd file separately, for example:
#   sudo apt-get install apache2-utils
#   sudo htpasswd -c /etc/nginx/.htpasswd-ohmoors-admin adminname

location = /admin/news {
    return 301 /admin/news/;
}

location /admin/news/ {
    auth_basic "Ohmoors Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-ohmoors-admin;
    limit_req zone=ohmoors_news_admin burst=10 nodelay;
    limit_req_status 418;

    proxy_pass http://127.0.0.1:8765/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_redirect off;
}

<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Aktuelles - Ohmoor Squeezers e.V.</title>
    <meta
      name="description"
      content="Aktuelle Neuigkeiten, Ankündigungen und Flyer der Ohmoor Squeezers e.V."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  </head>
  <body>
    {{ include: nav.html }}
    <main class="container page">
      <h1>Aktuelles</h1>
      <p class="muted">Neuigkeiten und Ankündigungen.</p>
      <p id="news-status" class="muted">News werden geladen...</p>
      <section id="news-list" class="news-list"></section>
    </main>
    <script>
      (function () {
        var statusEl = document.getElementById("news-status");
        var listEl = document.getElementById("news-list");

        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function sanitizeUrl(value) {
          var url = String(value || "").trim();

          if (!url) {
            return "";
          }

          if (
            /^(https?:|mailto:|tel:)/i.test(url) ||
            /^[./#?]/.test(url) ||
            !/^[a-z][a-z0-9+.-]*:/i.test(url)
          ) {
            return url;
          }

          return "";
        }

        function restorePlaceholders(text, placeholders) {
          return text.replace(/\u0000(\d+)\u0000/g, function (_, index) {
            return placeholders[Number(index)] || "";
          });
        }

        function renderInlineMarkdown(value) {
          var placeholders = [];
          var text = escapeHtml(value);

          function stash(html) {
            placeholders.push(html);
            return "\u0000" + (placeholders.length - 1) + "\u0000";
          }

          text = text.replace(/`([^`]+)`/g, function (_, code) {
            return stash("<code>" + code + "</code>");
          });

          text = text.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function (_, label, url) {
            var safeUrl = sanitizeUrl(url);
            if (!safeUrl) {
              return label;
            }

            return stash(
              '<a href="' +
                escapeHtml(safeUrl) +
                '" target="_blank" rel="noopener noreferrer">' +
                label +
                "</a>"
            );
          });

          text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
          text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");

          return restorePlaceholders(text, placeholders);
        }

        function renderMarkdown(value) {
          var lines = String(value || "").replace(/\r\n?/g, "\n").split("\n");
          var html = [];
          var paragraph = [];
          var listType = null;
          var listItems = [];

          function flushParagraph() {
            if (!paragraph.length) {
              return;
            }

            html.push("<p>" + renderInlineMarkdown(paragraph.join(" ")) + "</p>");
            paragraph = [];
          }

          function flushList() {
            if (!listType || !listItems.length) {
              listType = null;
              listItems = [];
              return;
            }

            html.push(
              "<" +
                listType +
                ">" +
                listItems
                  .map(function (item) {
                    return "<li>" + renderInlineMarkdown(item) + "</li>";
                  })
                  .join("") +
                "</" +
                listType +
                ">"
            );
            listType = null;
            listItems = [];
          }

          lines.forEach(function (line) {
            var trimmed = line.trim();
            var unorderedMatch = /^[-*+]\s+(.+)$/.exec(trimmed);
            var orderedMatch = /^(\d+)\.\s+(.+)$/.exec(trimmed);

            if (!trimmed) {
              flushParagraph();
              flushList();
              return;
            }

            if (unorderedMatch) {
              flushParagraph();
              if (listType !== "ul") {
                flushList();
                listType = "ul";
              }
              listItems.push(unorderedMatch[1]);
              return;
            }

            if (orderedMatch) {
              flushParagraph();
              if (listType !== "ol") {
                flushList();
                listType = "ol";
              }
              listItems.push(orderedMatch[2]);
              return;
            }

            flushList();
            paragraph.push(trimmed);
          });

          flushParagraph();
          flushList();

          return html.join("") || "<p></p>";
        }

        function render(newsItems) {
          if (!newsItems.length) {
            statusEl.textContent = "";
            listEl.innerHTML = "<p>Keine News vorhanden.</p>";
            return;
          }

          listEl.innerHTML = newsItems
            .map(function (item) {
              var date = escapeHtml(item.date || "");
              var title = escapeHtml(item.title || "");
              var text = renderMarkdown(item.text || "");
              var flyerUrl = sanitizeUrl(item.flyer_url || "");
              var flyerLabel = escapeHtml(item.flyer_label || "Flyer (PDF)");
              var flyerText = escapeHtml(item.flyer_text || "");
              var actionHtml = flyerUrl
                ? '<a class="button" href="' +
                  escapeHtml(flyerUrl) +
                  '" target="_blank" rel="noopener noreferrer">' +
                  flyerLabel +
                  "</a>"
                : '<span class="muted">' + flyerText + "</span>";

              return (
                '<article class="news-card">' +
                '<div class="news-meta">' +
                date +
                "</div>" +
                "<h2>" +
                title +
                "</h2>" +
                '<div class="news-body">' +
                text +
                "</div>" +
                '<div class="news-actions">' +
                actionHtml +
                "</div>" +
                "</article>"
              );
            })
            .join("");
          statusEl.textContent = "";
        }

        fetch("news.json", { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("HTTP " + response.status);
            }
            return response.json();
          })
          .then(function (data) {
            if (!Array.isArray(data)) {
              throw new Error("news.json hat kein Array-Format");
            }
            render(data);
          })
          .catch(function () {
            statusEl.textContent = "News konnten nicht geladen werden.";
            listEl.innerHTML = "";
          });
      })();
    </script>
    {{ include: footer.html }}
  </body>
</html>
